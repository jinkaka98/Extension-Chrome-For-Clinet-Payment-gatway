<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRIS Monitor</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>

  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <span class="header-title">QRIS Payment Monitor</span>
    <span class="mode-badge" id="modeBadge">LOCAL</span>
  </div>

  <div class="card">
    <div class="row">
      <span class="label">Monitor</span>
      <span class="value" id="monitorStatus">—</span>
    </div>
    <div class="row">
      <span class="label">Session QRIS</span>
      <span class="value" id="sessionStatus">—</span>
    </div>
    <div class="row">
      <span class="label">Transaksi hari ini</span>
      <span class="value highlight" id="totalHariIni">0</span>
    </div>
    <div class="row">
      <span class="label">Server Aktif</span>
      <span class="value server-url-display" id="activeServerUrl">—</span>
    </div>
  </div>

  <div class="card last-trx" id="lastTrxCard" style="display:none">
    <div class="card-label">Transaksi Terakhir</div>
    <div class="trx-nominal" id="lastNominal">—</div>
    <div class="trx-meta">
      <span id="lastNama">—</span> &bull;
      <span id="lastMetode">—</span>
    </div>
    <div class="trx-time" id="lastTime">—</div>
  </div>

  <!-- ── Panel Server Target ────────────────────────────────── -->
  <div class="card server-settings">
    <div class="card-label">🎯 Server Target</div>

    <div class="mode-toggle">
      <button class="mode-btn" id="btnModeLocal" data-mode="local">
        🏠 Local
      </button>
      <button class="mode-btn" id="btnModeProduction" data-mode="production">
        🌐 Production
      </button>
    </div>

    <div class="setting-group" id="groupLocal">
      <label class="setting-label">URL Local (IP:PORT)</label>
      <input type="text" id="inputLocalUrl" class="setting-input" placeholder="http://192.168.x.x:8000/api/qris" />
    </div>

    <div class="setting-group" id="groupProduction">
      <label class="setting-label">URL Production (Hosting)</label>
      <input type="text" id="inputProductionUrl" class="setting-input" placeholder="https://alpakyros.com/api/qris" />
    </div>

    <button id="btnSaveTarget" class="btn btn-save">💾 Simpan &amp; Terapkan</button>
    <div class="save-feedback" id="saveFeedback"></div>
  </div>

  <div class="actions">
    <button id="btnBukaQris" class="btn btn-primary">🔗 Buka Halaman QRIS</button>
    <button id="btnPing" class="btn btn-ping">📡 Test Ping Server</button>
    <button id="btnRefresh" class="btn btn-secondary">🔄 Refresh Data</button>
  </div>

  <div class="card ping-result" id="pingResultCard" style="display:none">
    <div class="card-label">Hasil Ping</div>
    <div class="ping-status" id="pingStatus">—</div>
    <div class="ping-latency" id="pingLatency">—</div>
    <div class="ping-meta" id="pingMeta">—</div>
  </div>

  <div class="footer">
    v1.0.0 &bull; <span id="lastUpdate">—</span>
  </div>

  <script src="popup.js"></script>
</body>

</html>
